# Health Check Strategy:
# - neo4j: HTTP check on web console (port 7474). 30s start_period for JVM warmup.
# - litellm: HTTP check on /health endpoint. 30s start_period for model loading.
# - mirofish: HTTP check on /health endpoint (port 5001). 45s start_period
#   because it depends on neo4j + litellm being healthy first.
# All services use restart: unless-stopped for auto-recovery on failure.

services:
  # Neo4j: knowledge graph storage for MiroFish-Offline
  neo4j:
    image: neo4j:5.18-community
    container_name: arc-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # LiteLLM: translates OpenAI-compatible calls to Anthropic API
  # MiroFish agent LLM calls go through here → Claude Haiku
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: arc-litellm
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: --model anthropic/${CLAUDE_HAIKU_MODEL:-claude-haiku-4-5-20251001} --port 4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # MiroFish-Offline: social simulation engine
  # Uses Neo4j for knowledge graphs, LiteLLM for LLM, host Ollama for embeddings
  mirofish:
    build:
      context: ./mirofish
      dockerfile: Dockerfile
    container_name: arc-mirofish
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:5001:5001"
    environment:
      # LLM → LiteLLM proxy → Claude Haiku
      LLM_API_KEY: "not-needed"
      LLM_BASE_URL: http://litellm:4000/v1
      LLM_MODEL_NAME: ${CLAUDE_HAIKU_MODEL:-claude-haiku-4-5-20251001}
      # Neo4j (Docker service name)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      # Embeddings → host Ollama (already running natively)
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_BASE_URL: http://host.docker.internal:11434
      # OASIS / CAMEL-AI also uses LiteLLM
      OPENAI_API_KEY: "not-needed"
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      # Flask
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "5001"
      FLASK_DEBUG: "false"
    volumes:
      - mirofish_uploads:/app/backend/uploads
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  neo4j_data:
  neo4j_logs:
  mirofish_uploads:
